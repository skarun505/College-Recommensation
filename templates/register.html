{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4 mb-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <h4 class="text-center mb-4 text-primary fw-bold">Create an Account</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label text-muted">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" autocomplete="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted">Password</label>
            <input type="password" name="password" class="form-control" autocomplete="new-password" required>
          </div>
          <div class="mb-4">
            <label class="form-label text-muted">Social Category</label>
            <select name="category" class="form-select" required>
              <option value="" selected disabled>Select Category...</option>
              <option value="OC">OC</option>
              <option value="BC">BC</option>
              <option value="BCM">BCM</option>
              <option value="MBC">MBC</option>
              <option value="SC">SC</option>
              <option value="SCA">SCA</option>
              <option value="ST">ST</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Register</button>
        </form>
        <hr class="my-4">
        <div class="text-center">
          <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
