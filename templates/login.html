{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <h4 class="text-center mb-4 text-primary fw-bold">Welcome Back</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label text-muted">Email address</label>
            <input type="email" name="email" class="form-control" autocomplete="email" required>
          </div>
          <div class="mb-4">
            <label class="form-label text-muted">Password</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Login</button>
        </form>
        <hr class="my-4">
        <div class="text-center">
          <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
